<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Course – EduNexa</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">

  <!-- ✅ Progress Bar -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
    }

    #progressWrapper {
      margin: 10px;
    }

    .player-container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 300px;
      background: #020617;
      color: #fff;
      overflow-y: auto;
      padding: 16px;
    }

    .course-title {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .module {
      margin-bottom: 12px;
    }

    .module-title {
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .lesson {
      padding-left: 12px;
      cursor: pointer;
      font-size: 14px;
      margin: 4px 0;
    }

    .lesson:hover {
      text-decoration: underline;
    }

    .lesson.active {
      color: #38bdf8;
      font-weight: bold;
    }

    .content {
      flex: 1;
      padding: 20px;
      background: #ffffff;
      overflow: auto;
    }

    iframe, video {
      width: 100%;
      height: 480px;
    }

    /* ================= 🤖 AI BUTTON ================= */

    #aiLauncher {
      position: fixed !important;
      bottom: 24px !important;
      right: 24px !important;

      background: #2563eb;
      color: white;
      width: 58px;
      height: 58px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 26px;
      cursor: pointer;

      z-index: 2147483647 !important;
      pointer-events: auto !important;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    }

    /* ================= 🤖 AI PANEL ================= */

    #aiPanel {
      position: fixed !important;
      bottom: 100px;
      right: 20px;

      width: 320px;
      height: 420px;
      background: #ffffff;
      border-radius: 12px;

      display: none;
      flex-direction: column;

      box-shadow: 0 8px 24px rgba(0,0,0,0.18);

      z-index: 2147483647 !important;
      pointer-events: auto !important;
    }

    .ai-header {
      padding: 10px 12px;
      background: #2563eb;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 12px 12px 0 0;
    }

    .ai-header button {
      background: transparent;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #aiMessages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
      background: #f8fafc;
    }

    .ai-msg {
      margin-bottom: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      max-width: 90%;
    }

    .ai-user {
      background: #dbeafe;
      align-self: flex-end;
    }

    .ai-bot {
      background: #e5e7eb;
    }

    .ai-input {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid #e5e7eb;
    }

    .ai-input input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .ai-input button {
      padding: 6px 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* ================= CLICK SAFETY ================= */

    iframe,
    video,
    canvas,
    .player-container,
    .content {
      pointer-events: auto !important;
    }
  </style>
</head>

<body>

<!-- ✅ Progress Bar -->
<div id="progressWrapper">
  <div style="font-size:14px;margin-bottom:4px;">
    Progress: <span id="progressPercent">0%</span>
  </div>
  <div style="background:#e5e7eb;border-radius:8px;height:10px;">
    <div id="progressBar"
         style="background:#22c55e;height:10px;width:0%;border-radius:8px;">
    </div>
  </div>
</div>

<div class="player-container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div id="courseTitle" class="course-title">Loading...</div>
    <div id="moduleList"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <h2 id="lessonTitle">Select a lesson</h2>
    <div id="lessonContent"></div>
  </div>

</div>


<!-- 🔐 Auth -->
<script src="/js/auth-global.js"></script>

<!-- 🎓 Player Logic -->
<script src="/player.js"></script>

<!-- 🤖 AI Floating Button -->
<div id="aiLauncher">🤖</div>

<!-- 🤖 AI Chat Panel -->
<div id="aiPanel">
  <div class="ai-header">
    <span>EduNexa AI Tutor</span>
    <button onclick="toggleAI()">✖</button>
  </div>

  <div id="aiMessages"></div>





  <div class="ai-actions">
  <button onclick="quickAI('Explain this in simple words')">Explain</button>
  <button onclick="quickAI('Give me a real example')">Example</button>
  <button onclick="quickAI('Summarize this lesson')">Summary</button>
  <button onclick="quickAI('Create a quiz from this topic')">Quiz</button>
</div>

<div class="ai-input">
  <input id="aiInput" placeholder="Ask about this lesson..." />
  <button onclick="sendAI()">Send</button>
</div>

<!-- 🧠 AI QUIZ GENERATOR -->
<div style="margin-top:30px;">
  <h3>📝 AI Quiz Generator</h3>

  <select id="quizDifficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <button onclick="generateQuiz()">Generate Quiz</button>

  <div id="quizContainer" style="margin-top:20px;"></div>
</div>

<script>
console.log("JS loaded");
console.log("LESSON_ID:", typeof LESSON_ID);
</script>


<script>
function getLessonId() {
  return window.CURRENT_LESSON_ID || null;
}

function getCourseId() {
  return window.CURRENT_COURSE_ID || null;
}

function getUserId() {
  return window.AUTH_USER_ID || null; // comes from auth-global.js
}
</script>

<!-- <script src="/assets/js/ai-chat.js"></script> -->


</body>
</html>
