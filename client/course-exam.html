<!DOCTYPE html>
<html>
<head>
<title>Final Exam</title>
<link rel="stylesheet" href="/css/student.css">
</head>

<body>

<h1>🎓 Final Course Exam</h1>

<div id="examContainer"></div>

<button onclick="submitExam()">Submit Exam</button>

<p id="examResult"></p>

<button id="finalExamBtn"
style="display:none"
onclick="startFinalExam()">
Take Final Exam
</button>

<script>

const urlParams = new URLSearchParams(window.location.search);
const courseId = urlParams.get("course_id");

let questions = [];
let answers = {};

async function loadExam(){

const res = await fetch(`/api/exam/course/${courseId}`);
questions = await res.json();

const container = document.getElementById("examContainer");

container.innerHTML = "";

questions.forEach((q,index)=>{

const div = document.createElement("div");

div.innerHTML = `
<h3>Question ${index+1}</h3>
<p>${q.question}</p>

<label><input type="radio" name="q${q.id}" value="A"> ${q.option_a}</label><br>
<label><input type="radio" name="q${q.id}" value="B"> ${q.option_b}</label><br>
<label><input type="radio" name="q${q.id}" value="C"> ${q.option_c}</label><br>
<label><input type="radio" name="q${q.id}" value="D"> ${q.option_d}</label>

<hr>
`;

container.appendChild(div);

});

}

function collectAnswers(){

questions.forEach(q=>{

const selected =
document.querySelector(`input[name="q${q.id}"]:checked`);

if(selected){
answers[q.id] = selected.value;
}

});

}

async function submitExam(){

collectAnswers();

const userId = localStorage.getItem("user_id");

const res = await fetch("/api/exam/submit",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
user_id:userId,
course_id:courseId,
answers
})

});

const data = await res.json();

const result = document.getElementById("examResult");

if(data.passed){

result.innerHTML = `
<h2>✅ Passed</h2>
Score: ${data.score}%
`;

}else{

result.innerHTML = `
<h2>❌ Failed</h2>
Score: ${data.score}%
You need 60% to pass
`;

}

}

loadExam();

function startFinalExam(){

const urlParams = new URLSearchParams(window.location.search);
const courseId = urlParams.get("course_id");

window.location.href =
`/student/course-exam.html?course_id=${courseId}`;

}

</script>

</body>
</html>
