<!DOCTYPE html>
<html>
<head>
  <title>Profile Preview | EduNexa</title>
  <meta charset="UTF-8" />
  <style>
    body { font-family: system-ui; padding: 30px; background:#f8fafc; }
    .card { background:white; padding:24px; border-radius:12px; max-width:700px; margin:auto; }
    h2 { margin-bottom:6px; }
    .muted { color:#64748b; }
  </style>
</head>
<body>

<div class="card">
  <h2 id="name">Loading...</h2>
  <p class="muted" id="headline"></p>
  <p id="bio"></p>
</div>

<script>
async function loadPreview() {
  try {
    const res = await fetch("/api/profile/public/preview/me", {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();
    if (!res.ok) throw data;

    document.getElementById("name").innerText = data.name || "";
    document.getElementById("headline").innerText = data.headline || "";
    document.getElementById("bio").innerText = data.bio || "";

  } catch {
    document.body.innerHTML = "<h3>Failed to load preview</h3>";
  }
}

loadPreview();
</script>

</body>
</html>
