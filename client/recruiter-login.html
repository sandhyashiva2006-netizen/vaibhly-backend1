<!DOCTYPE html>
<html>
<head>
  <title>Recruiter Login - EduNexa</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div style="max-width:400px;margin:80px auto;">
    <h2>🔐 Recruiter Login</h2>

    <input type="email" id="email" placeholder="Email" style="width:100%;margin:8px 0;padding:10px;">
    <input type="password" id="password" placeholder="Password" style="width:100%;margin:8px 0;padding:10px;">

    <button id="loginBtn" style="width:100%;padding:10px;">
      Login
    </button>

    <p style="margin-top:10px;">
      Don't have account?
      <a href="/recruiter-register.html">Register</a>
    </p>
  </div>

  <script src="/js/recruiter-login.js"></script>

</body>
</html>
