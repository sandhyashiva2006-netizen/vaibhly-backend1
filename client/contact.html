<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | EduNexa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins',sans-serif;
      background:#f8fafc;
    }
    .hero{
      background:linear-gradient(135deg,#0b5ed7,#4f46e5);
      color:#fff;
      padding:80px 0;
      text-align:center;
    }
    .card{
      border:none;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }
    .form-control{
      border-radius:12px;
      padding:12px;
    }
    .btn-primary{
      background:#0b5ed7;
      border:none;
      border-radius:12px;
      padding:12px;
      font-weight:600;
    }

.contact-hero {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(135deg,#2563eb,#4f46e5);
  color: white;
}

.contact-container {
  padding: 60px 20px;
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  max-width: 1000px;
  margin: auto;
}

.contact-info p {
  color: #555;
}

.contact-box {
  margin-top: 20px;
  padding: 15px;
  background: #eef2ff;
  border-radius: 10px;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.contact-form button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  border: none;
}


  </style>
</head>

<body>

<!-- HERO -->
<section class="contact-hero">
  <h1>We’re Here to Help</h1>
  <p>Have questions? Reach out and we’ll get back to you quickly.</p>
</section>

<section class="contact-container">

  <div class="contact-grid">

    <!-- LEFT INFO -->
    <div class="contact-info">
      <h3>Contact Information</h3>

      <p>📧 support@vaibhly.in</p>
      <p>📍 India</p>
      <p>⏱ Response within 24 hours</p>

      <div class="contact-box">
        <h5>Need Help?</h5>
        <p>Check FAQ for quick answers before contacting support.</p>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <form class="contact-form">

      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>

      <textarea placeholder="Your Message" rows="5" required></textarea>

      <button type="submit">Send Message</button>

    </form>

  </div>

</section>

</body>
</html>
