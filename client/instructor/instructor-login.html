<!DOCTYPE html>
<html>
<head>
<title>Instructor Login - Vaibhly</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#eef2f7;
display:flex;
height:100vh;
}

/* LEFT BRAND PANEL */

.brand{
flex:1;
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.brand img{
width:90px;
margin-bottom:20px;
}

.brand h1{
margin:0;
font-size:32px;
}

.brand p{
opacity:0.9;
margin-top:10px;
}

/* RIGHT LOGIN PANEL */

.login-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
width:380px;
border-radius:12px;
box-shadow:0 5px 25px rgba(0,0,0,0.1);
}

.login-box h2{
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1e40af;
}

/* FOOTER */

.login-footer{
margin-top:15px;
font-size:14px;
text-align:center;
}

.login-footer a{
color:#2563eb;
text-decoration:none;
}

.login-footer a:hover{
text-decoration:underline;
}

/* MOBILE */

@media(max-width:900px){

.brand{
display:none;
}

body{
justify-content:center;
align-items:center;
}

}

</style>
</head>

<body>

<!-- LEFT SIDE -->

<div class="brand">

<img src="/assets/logo.png">

<h1>Vaibhly</h1>

<p>Instructor Portal</p>

<p>Create courses, manage and grow your income.</p>

</div>

<!-- RIGHT SIDE -->

<div class="login-area">

<div class="login-box">

<h2>Instructor Login</h2>

<div class="input-group">
<input id="email" placeholder="Email Address">
</div>

<div class="input-group">
<input id="password" type="password" placeholder="Password">
</div>

<button onclick="loginInstructor()">
Login
</button>

<div class="login-footer">

<p>
New Instructor?
<a href="instructor-register.html">
Register Here
</a>
</p>

</div>

</div>

</div>

<script src="instructor-login.js"></script>

</body>
</html>
