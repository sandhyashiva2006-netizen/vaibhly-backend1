<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexa | Course Upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#0b5ed7;
      --secondary:#4f46e5;
      --accent:#f97316;
      --dark:#0f172a;
      --light:#f1f5f9;
    }
    body{font-family:'Poppins',sans-serif;background:var(--light)}
    .admin-card{background:#fff;border-radius:16px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
    .form-control,.form-select{border-radius:12px;padding:12px}
    .btn-primary{background:var(--primary);border:none;border-radius:12px;font-weight:600}
  </style>
</head>
<body>

<div class="container py-5">
  <h3 class="fw-bold mb-4">Add / Upload Course</h3>

  <div class="admin-card">
    <form>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Course Title</label>
          <input type="text" class="form-control" placeholder="Enter course title" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <select class="form-select">
            <option>IT & Technology</option>
            <option>Digital Skills</option>
            <option>Career Development</option>
            <option>Personality Development</option>
            <option>Free Courses</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Course Type</label>
          <select class="form-select">
            <option>Paid</option>
            <option>Free</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Content Format</label>
          <select class="form-select">
            <option>Video</option>
            <option>PDF</option>
            <option>Video + PDF</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Duration (Weeks)</label>
          <input type="number" class="form-control" placeholder="e.g. 6">
        </div>
        <div class="col-md-4">
          <label class="form-label">Course Price (₹)</label>
          <input type="number" class="form-control" placeholder="e.g. 2999">
        </div>
        <div class="col-md-6">
          <label class="form-label">Course Thumbnail</label>
          <input type="file" class="form-control" accept="image/*">
        </div>
        <div class="col-md-6">
          <label class="form-label">Upload Video</label>
          <input type="file" class="form-control" accept="video/*">
        </div>
        <div class="col-md-6">
          <label class="form-label">Upload PDF</label>
          <input type="file" class="form-control" accept="application/pdf">
        </div>
        <div class="col-md-12">
          <label class="form-label">Course Description</label>
          <textarea class="form-control" rows="4"></textarea>
        </div>
      </div>

      <div class="mt-4 text-end">
        <button type="submit" class="btn btn-primary px-4">Save Course</button>
      </div>
    </form>
  </div>
</div>
<script src="/admin/js/admin-auth.js"></script>
<script src="/admin/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
