<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instructor Profile | Vaibhly</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Poppins;
      margin: 0;
      background: #f8fafc;
    }

    /* HEADER */
    .profile-header {
      background: linear-gradient(135deg,#2563eb,#4f46e5);
      color: white;
      padding: 40px;
    }

    .header-container {
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: white;
    }

    .header-info h2 {
      margin: 0;
      font-size: 24px;
    }

    .stats {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.9;
    }

    /* BIO */
    .bio-section {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    /* COURSES */
    .courses-section {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
      gap: 20px;
    }

    .course-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: 0.25s ease;
    }

    .course-card:hover {
      transform: translateY(-5px);
    }

    .thumb {
      height: 140px;
      background: #ddd;
    }

    .course-body {
      padding: 12px;
    }

    .course-title {
      font-weight: 600;
      font-size: 15px;
    }

    .course-price {
      color: #2563eb;
      font-weight: 700;
      margin-top: 6px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="profile-header">
  <div class="header-container">
    <div class="avatar"></div>

    <div class="header-info">
      <h2 id="name">Loading...</h2>
      <div class="stats">
        ⭐ <span id="rating">4.8</span> | 👨‍🎓 <span id="students">0</span> students | 📚 <span id="coursesCount">0</span> courses
      </div>
    </div>
  </div>
</div>

<!-- BIO -->
<div class="bio-section">
  <h3>About Instructor</h3>
  <p id="bio">Loading bio...</p>
</div>

<!-- COURSES -->
<div class="courses-section">
  <h3>Courses by Instructor</h3>
  <div id="courseList" class="courses-grid"></div>
</div>

<script>

async function loadInstructor() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  try {

    const res = await fetch(`/api/profile/instructor/${id}`);
    const data = await res.json();

    const instructor = data.instructor || {};
    const courses = data.courses || [];

    // HEADER
    document.getElementById("name").innerText = instructor.name || "Instructor";
    document.getElementById("bio").innerText = instructor.bio || "No bio available";

    document.getElementById("coursesCount").innerText = courses.length;

    // Fake stats (can upgrade later)
    document.getElementById("students").innerText = courses.length * 120;
    document.getElementById("rating").innerText = (4.5 + Math.random()*0.4).toFixed(1);

    // COURSES
    const container = document.getElementById("courseList");

    courses.forEach(course => {

      const card = document.createElement("div");
      card.className = "course-card";

      card.innerHTML = `
        <div class="thumb"></div>
        <div class="course-body">
          <div class="course-title">${course.title}</div>
          <div class="course-price">₹ ${course.price}</div>
        </div>
      `;

      container.appendChild(card);

    });

  } catch (err) {
    console.error(err);
    alert("Failed to load instructor");
  }

}

loadInstructor();

</script>

</body>
</html>
