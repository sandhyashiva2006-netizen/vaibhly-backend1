<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EduNexa | Course</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Professional online course on EduNexa." />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Poppins, sans-serif;
      background: #f8fafc;
      margin: 0;
    }

    header {
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      color: white;
      padding: 18px 30px;
      font-size: 22px;
      font-weight: 700;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 30px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
    }

    .desc {
      margin-top: 12px;
      font-size: 16px;
      color: #475569;
    }

    .price {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 700;
      color: #16a34a;
    }

    .cta {
      margin-top: 20px;
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .cta:hover {
      background: #1d4ed8;
    }

    .box {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #475569;
    }

    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>🎓 EduNexa</header>

<div class="container">

  <div class="hero">

    <div>
      <div id="courseTitle" class="title">Loading...</div>
      <div id="courseDesc" class="desc"></div>
      <div id="coursePrice" class="price"></div>

      <button id="enrollBtn" class="cta">Enroll Now</button>
    </div>

    <div class="box">
      <h3>📘 Course Highlights</h3>
      <p id="moduleCount">Loading modules...</p>
      <p>🎓 Certificate included</p>
      <p>🧑‍🏫 Industry aligned curriculum</p>
      <p>💼 Placement guidance</p>
    </div>

  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const courseId = params.get("id");
  const token = localStorage.getItem("token");

  if (!courseId) {
    alert("Invalid course");
    window.location.href = "courses.html";
  }

  async function loadCourse() {
    try {
      const res = await fetch(`/api/public/course/${courseId}`);
      const course = await res.json();

      if (!res.ok) {
        alert("Course not found");
        return;
      }

      document.getElementById("courseTitle").innerText = course.title;
      document.getElementById("courseDesc").innerText = course.description || "";
      document.getElementById("coursePrice").innerText = "₹ " + course.price;
      document.getElementById("moduleCount").innerText =
        "📦 Modules: " + course.modules;
document.getElementById("courseTitle").innerText = course.title;
document.getElementById("courseDesc").innerText = course.description || "";
// ✅ Dynamic SEO
document.title = `${course.title} | EduNexa`;

const metaDesc = document.querySelector("meta[name='description']");
if (metaDesc) {
  metaDesc.setAttribute(
    "content",
    course.description || `Join ${course.title} course on EduNexa.`
  );
}

    } catch (err) {
      alert("Failed to load course");
    }
  }

  document.getElementById("enrollBtn").onclick = () => {
    if (!token) {
      window.location.href = "login.html";
    } else {
      window.location.href = `store.html`;
    }
  };

  loadCourse();
</script>

</body>
</html>
