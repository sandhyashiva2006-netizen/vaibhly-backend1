<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexa | Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#0b5ed7;
      --secondary:#4f46e5;
      --accent:#f97316;
      --dark:#0f172a;
      --light:#f1f5f9;
    }
    body{
      font-family:'Poppins',sans-serif;
      background:var(--light);
    }
    .sidebar{
      background:linear-gradient(180deg,var(--primary),var(--secondary));
      min-height:100vh;
      color:#fff;
      padding:20px;
    }
    .sidebar h4{
      font-weight:700;
      margin-bottom:30px;
    }
    .sidebar a{
      color:#e0e7ff;
      text-decoration:none;
      display:block;
      padding:10px 15px;
      border-radius:10px;
      margin-bottom:8px;
      font-weight:500;
    }
    .sidebar a:hover{
      background:rgba(255,255,255,0.15);
    }
    .dashboard-card{
      background:#fff;
      border-radius:16px;
      padding:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }
    .progress{
      height:8px;
      border-radius:10px;
    }
    .badge-cert{
      background:var(--accent);
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar">
      <h4>EduNexa</h4>
      <a href="#">Dashboard</a>
      <a href="#">My Courses</a>
      <a href="#">Quizzes & Exams</a>
      <a href="#">Certificates</a>
      <a href="#">Resume Builder</a>
      <a href="#">Interview Prep</a>
      <a href="#">Profile</a>
      <a href="#">Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9 col-lg-10 p-4">
      <h3 class="fw-bold mb-4">Welcome back, Student 👋</h3>

      <!-- STATS -->
      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="dashboard-card text-center">
            <h5>Enrolled Courses</h5>
            <h2 class="fw-bold mt-2">3</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="dashboard-card text-center">
            <h5>Completed</h5>
            <h2 class="fw-bold mt-2">1</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="dashboard-card text-center">
            <h5>Certificates</h5>
            <h2 class="fw-bold mt-2">1</h2>
          </div>
        </div>
      </div>

      <!-- COURSES -->
      <h5 class="fw-semibold mb-3">My Courses</h5>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="dashboard-card">
            <span class="badge badge-cert mb-2">Certificate</span>
            <h6 class="mt-2">Full Stack Web Development</h6>
            <div class="progress mt-2">
              <div class="progress-bar bg-success" style="width:70%"></div>
            </div>
            <small class="text-muted">70% completed</small>
          </div>
        </div>

        <div class="col-md-6">
          <div class="dashboard-card">
            <span class="badge bg-success mb-2">Free</span>
            <h6 class="mt-2">Resume Building & Interview Prep</h6>
            <div class="progress mt-2">
              <div class="progress-bar bg-warning" style="width:40%"></div>
            </div>
            <small class="text-muted">40% completed</small>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
