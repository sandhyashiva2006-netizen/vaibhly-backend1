<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EduNexa Admin — Modules</title>

  <!-- Main Admin Theme -->
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<!-- AUTH -->
<script src="/js/auth-global.js"></script>

<div class="admin-wrapper">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <h2>EduNexa</h2>
    <ul>
      <li><a href="/admin/admin.html">Dashboard</a></li>
      <li><a href="/admin/admin-courses.html">Courses</a></li>
      <li><a class="active" href="/admin/admin-modules.html">Modules</a></li>
      <li><a href="/admin/admin-lessons.html">Lessons</a></li>
      <li><a href="/admin/admin-exams.html">Exams</a></li>
      <li><a href="/admin/admin-questions.html">Questions</a></li>
      <li><a href="/admin/admin-results.html">Results</a></li>
    </ul>

    <button id="adminLogout" class="admin-logout">Logout</button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <h1>📦 Modules Management</h1>

    <!-- FILTER -->
    <div class="card">
      <label>Select Course</label>
      <select id="courseSelect"></select>
    </div>

    <!-- CREATE MODULE -->
    <div class="card">
      <h3>Create Module</h3>
      <div class="form-row">
        <input type="text" id="moduleTitle" placeholder="Module title">
        <button id="createModuleBtn" class="primary-btn">➕ Add Module</button>
      </div>
    </div>

    <!-- MODULE TABLE -->
    <div class="card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Module Title</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="modulesTableBody">
          <tr>
            <td colspan="3">Select a course</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- JS -->
<script src="/admin/admin-modules.js"></script>
</body>
</html>
