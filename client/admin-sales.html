<!DOCTYPE html>
<html>
<head>
  <title>Admin Sales Dashboard - EduNexa</title>
  <style>
    body {
      font-family: Poppins, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
    }

    .header {
      background: linear-gradient(90deg,#0b5ed7,#4f46e5);
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: 600;
    }

    .container {
      padding: 30px;
      max-width: 1200px;
      margin: auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      text-align: center;
    }

    .value {
      font-size: 26px;
      font-weight: bold;
      color: #2563eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #f1f5f9;
    }
  </style>
</head>

<body>

<div class="header">📊 Admin Sales Dashboard</div>

<div class="container">

  <div class="stats">
    <div class="card">
      <div>Total Revenue</div>
      <div id="revenue" class="value">₹ 0</div>
    </div>
    <div class="card">
      <div>Total Orders</div>
      <div id="orders" class="value">0</div>
    </div>
  </div>

  <h3>🔥 Top Selling Courses</h3>
  <table>
    <thead>
      <tr>
        <th>Course</th>
        <th>Sales</th>
      </tr>
    </thead>
    <tbody id="topCourses"></tbody>
  </table>

  <br>

  <h3>📅 Daily Revenue (Last 7 Days)</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Revenue</th>
      </tr>
    </thead>
    <tbody id="dailySales"></tbody>
  </table>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Admin login required");
  window.location.href = "login.html";
}

async function loadSales() {
  try {
    const res = await fetch("/api/store/admin/sales", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    document.getElementById("revenue").innerText = "₹ " + data.revenue;
    document.getElementById("orders").innerText = data.totalOrders;

    const topBody = document.getElementById("topCourses");
    topBody.innerHTML = "";
    data.topCourses.forEach(c => {
      topBody.innerHTML += `
        <tr>
          <td>${c.title}</td>
          <td>${c.sales}</td>
        </tr>
      `;
    });

    const dailyBody = document.getElementById("dailySales");
    dailyBody.innerHTML = "";
    data.dailySales.forEach(d => {
      dailyBody.innerHTML += `
        <tr>
          <td>${new Date(d.date).toLocaleDateString()}</td>
          <td>₹ ${d.revenue}</td>
        </tr>
      `;
    });

  } catch (err) {
    console.error("Sales load error:", err);
    alert("Failed to load sales dashboard");
  }
}

loadSales();
</script>

</body>
</html>
