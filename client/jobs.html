<!DOCTYPE html>
<html>
<head>
  <title>Browse Jobs</title>
  <style>
    body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f3f2ef; /* LinkedIn color */
}
    .job-card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    button {
      padding: 6px 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
.jobs-container{
 max-width:1100px;
 margin:auto;
 padding:30px;
}

.filters{
 display:flex;
 gap:12px;
 margin-bottom:25px;
 flex-wrap:wrap;
}

.filters input,
.filters select{
 padding:10px;
 border-radius:8px;
 border:1px solid #ddd;
}

.filters button{
 background:#4f46e5;
 color:white;
 border:none;
 padding:10px 18px;
 border-radius:8px;
 cursor:pointer;
}

/* JOB CARD */

.job-card{
 background:white;
 padding:20px;
 border-radius:12px;
 margin-bottom:15px;
 box-shadow:0 5px 15px rgba(0,0,0,.08);
 transition:.3s;
}

.job-card:hover{
 transform:translateY(-5px);
 box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.featured{
 color:gold;
 font-weight:bold;
 margin-bottom:5px;
}

.apply-btn{
 background:#4f46e5;
 color:white;
 border:none;
 padding:8px 14px;
 border-radius:6px;
 cursor:pointer;
 margin-top:10px;
}
.jobs-layout{
 display:grid;
 grid-template-columns:280px 420px 1fr;
 gap:20px;
 padding:20px;
 height:100vh;
}

/* LEFT FILTER */
.filters{
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 3px 10px rgba(0,0,0,.05);
 height:fit-content;
}

.filters h3{
 margin-bottom:15px;
}

.filters input,
.filters select{
 width:100%;
 padding:12px;
 margin-bottom:12px;
 border-radius:8px;
 border:1px solid #ddd;
 background:#fafafa;
}

/* JOB LIST */
.job-list{
 overflow-y:auto;
 padding:15px;
 border-right:1px solid #eee;
}

.job-card{
 background:white;
 padding:18px;
 margin-bottom:14px;
 border-radius:12px;
 cursor:pointer;
 transition:.25s;
 border:1px solid #eee;
}

.job-card:hover{
 transform:translateY(-3px);
 box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.job-card.active{
 border-left:5px solid #4f46e5;
 background:#f8faff;
}

/* RIGHT PREVIEW */
.job-preview{
 background:white;
 border-radius:12px;
 padding:25px;
 box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.apply-btn{
 background:#4f46e5;
 color:white;
 border:none;
 padding:12px 22px;
 border-radius:8px;
 font-weight:600;
 cursor:pointer;
 transition:.2s;
}

.apply-btn:hover{
 background:#4338ca;
 transform:scale(1.03);
}

.reset-btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ef4444;
color:#fff;
font-weight:500;
cursor:pointer;
transition:.2s;
}

.reset-btn:hover{
background:#dc2626;
}

.applied-badge{
background:#22c55e;
color:#fff;
padding:6px 12px;
border-radius:6px;
font-size:14px;
}

  </style>
</head>
<body>

<div class="jobs-layout">

  <!-- LEFT FILTERS -->
  <div class="filters">

    <h3>Filters</h3>

    <input id="searchInput"
      placeholder="Search jobs..."
      oninput="loadJobs()">

    <select id="locationFilter" onchange="loadJobs()">
      <option value="">Location</option>
      <option>Visakhapatnam</option>
      <option>Hyderabad</option>
      <option>Bangalore</option>
    </select>

    <select id="jobTypeFilter" onchange="loadJobs()">
      <option value="">Job Type</option>
      <option>Full-time</option>
      <option>Part-time</option>
      <option>Internship</option>
    </select>

    <select id="experienceFilter" onchange="loadJobs()">
      <option value="">Experience</option>
      <option>Fresher</option>
      <option>1-3 Years</option>
    </select>

<button class="reset-btn" onclick="resetFilters()">Reset Filters</button>

  </div>



  <!-- JOB LIST -->
  <div class="job-list" id="jobsList"></div>

  <!-- JOB PREVIEW -->
  <div class="job-preview" id="jobPreview">
    <h3>Select a job</h3>
    <p>Job details appear here</p>
  </div>

<div id="studentJobsSection"></div>

<div id="studentApplicationsSection"></div>

</div>



<script>
const token = localStorage.getItem("token");

async function loadJobs(){

 const search =
   document.getElementById("searchInput").value || "";

 const location =
   document.getElementById("locationFilter").value || "";

 const jobType =
   document.getElementById("jobTypeFilter").value || "";

 const experience =
   document.getElementById("experienceFilter").value || "";

 const query =
 `/api/recruiter/jobs?search=${encodeURIComponent(search)}`
+`&location=${encodeURIComponent(location)}`
+`&job_type=${encodeURIComponent(jobType)}`
+`&experience_level=${encodeURIComponent(experience)}`;

 const res = await fetch(query);
 const jobs = await res.json();

 const container =
   document.getElementById("jobsList");

 container.innerHTML="";

 jobs.forEach(job=>{

   const div=document.createElement("div");
   div.className="job-card";

   div.innerHTML=`
  <h4>${job.title}</h4>

  <p style="color:#555;margin:4px 0;">
    ${job.company_name || "Company"}
  </p>

  <p style="font-size:14px;color:#777;">
    📍 ${job.location}
  </p>

  <span style="
    background:#eef2ff;
    color:#4f46e5;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;">
    ${job.job_type || "Full Time"}
  </span>
`;

   div.onclick=()=>{
     selectJob(job,div);
   };

   container.appendChild(div);
 });
}

function selectJob(job,element){

 document
  .querySelectorAll(".job-card")
  .forEach(c=>c.classList.remove("active"));

 element.classList.add("active");

 document.getElementById("jobPreview")
 .innerHTML=`
   <h2>${job.title}</h2>
   <p><b>Location:</b> ${job.location}</p>
   <p>${job.description || ""}</p>

   <button class="apply-btn"
     onclick="applyJob(${job.id})">
     Apply Now
   </button>
 `;
}

function resetFilters(){

document.querySelector("input[placeholder='Search jobs...']").value = "";
document.querySelectorAll("select").forEach(select => select.selectedIndex = 0);

// reload jobs
loadJobs();

}

async function applyJob(jobId){



if(!token){
localStorage.setItem("redirectAfterLogin", window.location.href);
window.location.href = "/login.html";
return;
}

try{

const res = await fetch(`http://localhost:5000/api/student/apply/${jobId}`, {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": `Bearer ${token}`
}
});

// handle errors safely
if(!res.ok){
const text = await res.text();
console.error("API ERROR:", text);
alert("Apply failed");
return;
}

const isApplied = appliedJobs.some(j => j.job_id == job.id);

button.innerHTML = isApplied 
  ? `<span class="applied-badge">Applied ✓</span>`
  : `<button onclick="applyJob(${job.id})">Apply</button>`;

const data = await res.json();
console.log(data);

alert("Applied successfully!");

}catch(err){
console.error("ERROR:", err);
alert("Server connection failed");
}

}

loadJobs();
</script>
<script src="js/student-jobs.js"></script>
</body>
</html>
