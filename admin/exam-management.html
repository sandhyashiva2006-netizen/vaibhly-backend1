<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexa | Quiz & Exam System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#0b5ed7;
      --secondary:#4f46e5;
      --accent:#f97316;
      --dark:#0f172a;
      --light:#f1f5f9;
    }
    body{font-family:'Poppins',sans-serif;background:var(--light)}
    .admin-card{background:#fff;border-radius:16px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
    .badge-pass{background:#22c55e}
    .badge-fail{background:#ef4444}
  </style>
</head>
<body>

<div class="container py-5">
  <h3 class="fw-bold mb-4">Quiz & Exam Management</h3>

  <!-- EXAM SETTINGS -->
  <div class="admin-card mb-4">
    <h5 class="fw-semibold mb-3">Exam Configuration</h5>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Total Questions</label>
        <input type="number" class="form-control" value="20">
      </div>
      <div class="col-md-3">
        <label class="form-label">Time Limit (mins)</label>
        <input type="number" class="form-control" value="30">
      </div>
      <div class="col-md-3">
        <label class="form-label">Pass Percentage</label>
        <input type="number" class="form-control" value="60">
      </div>
      <div class="col-md-3">
        <label class="form-label">Attempts Allowed</label>
        <input type="number" class="form-control" value="3">
      </div>
    </div>
  </div>

  <!-- QUESTION CREATOR -->
  <div class="admin-card mb-4">
    <h5 class="fw-semibold mb-3">Add Question (MCQ)</h5>
    <div class="mb-3">
      <label class="form-label">Question</label>
      <textarea class="form-control" rows="2"></textarea>
    </div>
    <div class="row g-3">
      <div class="col-md-6"><input type="text" class="form-control" placeholder="Option A"></div>
      <div class="col-md-6"><input type="text" class="form-control" placeholder="Option B"></div>
      <div class="col-md-6"><input type="text" class="form-control" placeholder="Option C"></div>
      <div class="col-md-6"><input type="text" class="form-control" placeholder="Option D"></div>
    </div>
    <div class="mt-3">
      <label class="form-label">Correct Answer</label>
      <select class="form-select">
        <option>A</option>
        <option>B</option>
        <option>C</option>
        <option>D</option>
      </select>
    </div>
    <div class="mt-3 text-end">
      <button class="btn btn-primary">Add Question</button>
    </div>
  </div>

  <!-- STUDENT RESULT PREVIEW -->
  <div class="admin-card">
    <h5 class="fw-semibold mb-3">Student Exam Results</h5>
    <table class="table">
      <thead>
        <tr>
          <th>Student</th>
          <th>Score</th>
          <th>Status</th>
          <th>Attempts</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Ravi Kumar</td>
          <td>72%</td>
          <td><span class="badge badge-pass">Pass</span></td>
          <td>1</td>
        </tr>
        <tr>
          <td>Anjali</td>
          <td>48%</td>
          <td><span class="badge badge-fail">Fail</span></td>
          <td>2</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
<script src="/admin/js/admin-auth.js"></script>
<script src="/admin/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
