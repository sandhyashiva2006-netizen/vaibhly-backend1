<!DOCTYPE html>
<html>
<head>
  <title>My Wallet</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<div class="main">
  <h1>🪙 My Wallet</h1>

  <div class="wallet-card">
    <h2 id="walletBalance">Loading...</h2>
  </div>

  <h3>📜 Coin History</h3>
  <div id="coinHistory" class="coin-history"></div>
</div>

<script>
async function loadWallet() {
  const token = localStorage.getItem("token");

  const balanceRes = await fetch("/api/wallet/balance", {
    headers: { Authorization: "Bearer " + token }
  });

  const balanceData = await balanceRes.json();
  document.getElementById("walletBalance").innerText =
    balanceData.coins + " Coins";

  const historyRes = await fetch("/api/wallet/transactions", {
    headers: { Authorization: "Bearer " + token }
  });

  const historyData = await historyRes.json();
  const container = document.getElementById("coinHistory");

  if (!historyData.transactions.length) {
    container.innerHTML = "<p>No coin activity yet.</p>";
    return;
  }

  historyData.transactions.forEach(tx => {
    const div = document.createElement("div");
    div.className = "coin-item";
    div.innerHTML = `
      <strong>+${tx.amount} Coins</strong>
      <div>${tx.type}</div>
      <small>${new Date(tx.created_at).toLocaleString()}</small>
    `;
    container.appendChild(div);
  });
}

loadWallet();
</script>

</body>
</html>
