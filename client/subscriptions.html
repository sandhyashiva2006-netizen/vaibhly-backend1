<!DOCTYPE html>
<html>
<head>
  <title>EduNexa | Subscriptions</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="/js/auth-global.js"></script>
</head>

<body>

<div class="app">

  <main class="main">

    <h1>💳 Choose Your Plan</h1>

    <div id="plansGrid" class="course-grid"></div>

  </main>

</div>

<script>
if (!window.token) {
  window.location.href = "/login.html";
}

async function loadPlans() {
  const res = await fetch("/api/subscriptions/public-plans", {

    headers: { Authorization: "Bearer " + window.token }
  });

  const plans = await res.json();
  const grid = document.getElementById("plansGrid");
  grid.innerHTML = "";

  plans
    .filter(p => p.is_active)
    .forEach(plan => {
      const div = document.createElement("div");
      div.className = "card gradient-blue";

      div.innerHTML = `
        <h3>${plan.name}</h3>
        <p>${plan.description || ""}</p>
        <h2>₹${plan.price}</h2>
        <p>${plan.duration_days} days access</p>
        <button onclick="subscribe(${plan.id})">Subscribe</button>
      `;

      grid.appendChild(div);
    });
}

async function subscribe(planId) {
  alert("✅ Subscription simulated. Payment integration coming next.");

  await fetch("/api/subscriptions/subscribe", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + window.token
    },
    body: JSON.stringify({ plan_id: planId })
  });

  alert("🎉 Subscription activated!");
}

loadPlans();
</script>

</body>
</html>
