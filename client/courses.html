<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduNexa | Explore Courses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Explore professional online courses from EduNexa. Learn Full Stack Development, Digital Marketing, and more. Get certified and grow your career." />

<meta property="og:title" content="EduNexa | Explore Professional Courses" />
<meta property="og:description" content="Browse industry-aligned courses with certification and career support." />
<meta property="og:type" content="website" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Poppins, sans-serif;
      background: #f8fafc;
      margin: 0;
    }

    header {
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      color: white;
      padding: 18px 30px;
      font-size: 22px;
      font-weight: 700;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .thumb {
      height: 160px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 14px;
      color: #475569;
      min-height: 40px;
    }

    .price {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 700;
      color: #16a34a;
    }

    .btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>🎓 EduNexa — Explore Courses</header>

<div class="container">
  <div id="courseGrid" class="grid">
    Loading courses...
  </div>
</div>

<script>
  console.log("🌍 Public Courses Loaded");

  async function loadPublicCourses() {
    try {
      const res = await fetch("/api/public/courses");
      const courses = await res.json();

      const grid = document.getElementById("courseGrid");
      grid.innerHTML = "";

      if (!courses.length) {
        grid.innerHTML = "<p>No courses available.</p>";
        return;
      }

      courses.forEach(course => {
        const card = document.createElement("div");
        card.className = "card";

        card.onclick = () => {
          window.location.href = `course.html?id=${course.id}`;
        };

        card.innerHTML = `
          <div class="thumb">📘</div>
          <div class="content">
            <div class="title">${course.title}</div>
            <div class="desc">${course.description || ""}</div>
            <div class="price">₹ ${course.price}</div>
            <button class="btn">View Details</button>
          </div>
        `;

        grid.appendChild(card);
      });

    } catch (err) {
      console.error("Public course load failed:", err);
      document.getElementById("courseGrid").innerHTML =
        "<p>Failed to load courses.</p>";
    }
  }

  loadPublicCourses();
</script>

</body>
</html>
