<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexa | Student Login & Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#0b5ed7;
      --secondary:#4f46e5;
      --accent:#f97316;
      --dark:#0f172a;
      --light:#f1f5f9;
    }
{
  "token": "JWT_TOKEN_HERE",
  "user": {
    "id": 1,
    "name": "Test Student",
    "email": "student1@test.com"
  }
}

    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .auth-card{
      background:#fff;
      border-radius:18px;
      padding:35px;
      width:100%;
      max-width:420px;
      box-shadow:0 20px 40px rgba(0,0,0,0.15);
    }
    .auth-card h2{
      font-weight:700;
      color:var(--dark);
    }
    .form-control{
      border-radius:12px;
      padding:12px;
    }
    .btn-primary{
      background:var(--primary);
      border:none;
      border-radius:12px;
      padding:12px;
      font-weight:600;
    }
    .switch-link{
      color:var(--primary);
      cursor:pointer;
      font-weight:500;
    }

  </style>
</head>
<body>

<div class="auth-card">
  <h2 class="text-center mb-3">Student Login</h2>
  <p class="text-center text-muted mb-4">Access your courses & certificates</p>

  <form>
    <div class="mb-3">
      <input type="email" class="form-control" placeholder="Email address" required>
    </div>
    <div class="mb-3">
      <input type="password" class="form-control" placeholder="Password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <div class="text-center mt-4">
    <span class="text-muted">New to EduNexa?</span>
    <span class="switch-link"> Create account</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
